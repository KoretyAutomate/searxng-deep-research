name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    name: Lint, Format & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt || true; fi
          if [ -f pyproject.toml ]; then pip install -e . || pip install . || true; fi

      # Lint and format run as informational for now (gradual rollout).
      # Flip continue-on-error to false once the codebase is clean to make them blocking.
      - name: Lint (ruff)
        continue-on-error: true
        run: ruff check .

      - name: Format check (ruff)
        continue-on-error: true
        run: ruff format --check .

      - name: Test (pytest)
        run: |
          if [ -d tests ] || [ -d test ] || ls test_*.py *_test.py >/dev/null 2>&1; then
            pytest
          else
            echo "No tests found — skipping pytest."
          fi
